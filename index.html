<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<title>Player de Vídeo</title>
<style>
  body{
    font-family: Arial;
    text-align: center;
    background:#111;
    color:white;
  }
  video{
    width:70%;
    margin-top:20px;
    border-radius:10px;
  }
  button{
    padding:10px 15px;
    margin:5px;
    font-size:16px;
    cursor:pointer;
  }
</style>
</head>
<body>

<h2>Player de Vídeo</h2>

<video id="meuVideo">
  <source src="video.mp4" type="video/mp4">
  Seu navegador não suporta vídeo.
</video>

<br><br>

<button onclick="playVideo()">▶ Play</button>
<button onclick="pauseVideo()">⏸ Pause</button>
<button onclick="velocidade(0.5)">🐢 0.5x</button>
<button onclick="velocidade(1)">▶ 1x</button>
<button onclick="velocidade(1.5)">⚡ 1.5x</button>
<button onclick="velocidade(2)">🚀 2x</button>

<script>
let video = document.getElementById("meuVideo");

function playVideo(){
  video.play();
}

function pauseVideo(){
  video.pause();
}

function velocidade(v){
  video.playbackRate = v;
}
</script>

</body>
</html>
